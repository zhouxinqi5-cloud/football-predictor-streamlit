services:
  - type: web
    name: football-predictor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
